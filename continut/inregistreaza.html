
    <form>
        <fieldset>
            <legend>Informații generale:</legend>
            
            <label for="username">Nume utilizator:</label>
            <input type="text" id="username" name="username">

            <label for="password">Parola:</label>
            <input type="password" id="password" name="password">

            <label for="fname">Nume:</label>
            <input type="text" id="fname" name="fname">

            <label for="lname">Prenume:</label>
            <input type="text" id="lname" name="lname">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Telefon:</label>
            <input type="tel" id="phone" name="phone" required>
        </fieldset>

        <fieldset>
            <legend>Informații personale:</legend>

            <label for="sex">Sexul:</label>
            <select id="sex" name="sex">
                <option value="masculin">Masculin</option>
                <option value="feminin">Feminin</option>
            </select>

            <label for="subject">Subiect de interes:</label>
            <input list="subject" name="subject" id="subjectInput">
            <datalist id="subject">
                <option value="Sfaturi de nutritie">
                <option value="Tratamente naturiste">
                <option value="Stil de viata">
            </datalist>

            <label for="color">Culoarea preferată de fundal</label>
            <input type="color" id="color" name="color">

            <label for="birthdate">Data nașterii</label>
            <input type="date" id="birthdate" name="birthdate">
            
            <label for="hour">Ora nașterii</label>
            <input type="time" id="hour" name="hour">

            <label for="age">Vârsta</label>
            <input type="range" id="age" name="age">
            
            <label for="webpage">Adresa paginii personale</label>
            <input type="url" id="webpage" name="webpage">
            
            <label for="description">Descriere</label>
            <textarea id="description" name="description" rows="10" cols="40" id="description" name="description">
            </textarea>
        </fieldset>

        <button type="button" onclick="register()" id="registerBtn">Înregistrează</button>
    </form>
